sition-all bg-slate-800 border-slate-700 opacity-60"><div class="text-[10px] font-black uppercase opacity-80">Mesa 5</div><div class="text-xl font-black">R$ 0.00</div></div><div class="p-4 rounded-2xl border-2 transition-all bg-slate-800 border-slate-700 opacity-60"><div class="text-[10px] font-black uppercase opacity-80">Mesa 6</div><div class="text-xl font-black">R$ 0.00</div></div><div class="p-4 rounded-2xl border-2 transition-all bg-slate-800 border-slate-700 opacity-60"><div class="text-[10px] font-black uppercase opacity-80">Mesa 7</div><div class="text-xl font-black">R$ 0.00</div></div><div class="p-4 rounded-2xl border-2 transition-all bg-slate-800 border-slate-700 opacity-60"><div class="text-[10px] font-black uppercase opacity-80">Mesa 8</div><div class="text-xl font-black">R$ 0.00</div></div><div class="p-4 rounded-2xl border-2 transition-all bg-slate-800 border-slate-700 opacity-60"><div class="text-[10px] font-black uppercase opacity-80">Mesa 9</div><div class="text-xl font-black">R$ 0.00</div></div><div class="p-4 rounded-2xl border-2 transition-all bg-slate-800 border-slate-700 opacity-60"><div class="text-[10px] font-black uppercase opacity-80">Mesa 10</div><div class="text-xl font-black">R$ 0.00</div></div><div class="p-4 rounded-2xl border-2 transition-all bg-slate-800 border-slate-700 opacity-60"><div class="text-[10px] font-black uppercase opacity-80">Mesa 11</div><div class="text-xl font-black">R$ 0.00</div></div><div class="p-4 rounded-2xl border-2 transition-all bg-slate-800 border-slate-700 opacity-60"><div class="text-[10px] font-black uppercase opacity-80">Mesa 12</div><div class="text-xl font-black">R$ 0.00</div></div></div></div></main><nav class="fixed bottom-0 w-full bg-slate-900/95 backdrop-blur-md p-4 border-t border-slate-800 flex gap-2 z-40 overflow-x-auto no-scrollbar"><button class="flex-none px-6 py-4 rounded-2xl font-black text-[10px] uppercase transition-all active-tab">Mesas</button><button class="flex-none px-6 py-4 rounded-2xl font-black text-[10px] uppercase transition-all bg-slate-800 text-slate-500">Fiado</button><button class="flex-none px-6 py-4 rounded-2xl font-black text-[10px] uppercase transition-all bg-slate-800 text-slate-500">Estoque</button><button class="flex-none px-6 py-4 rounded-2xl font-black text-[10px] uppercase transition-all bg-slate-800 text-slate-500">Equipe</button><button class="flex-none px-6 py-4 rounded-2xl font-black text-[10px] uppercase transition-all bg-slate-800 text-slate-500">Logs</button><button class="flex-none px-6 py-4 rounded-2xl font-black text-[10px] uppercase transition-all bg-slate-800 text-slate-500">Financeiro</button><button class="flex-none px-6 py-4 rounded-2xl font-black text-[10px] uppercase transition-all bg-slate-800 text-slate-500">Gastos</button></nav></div></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo } = React;

        const SUPABASE_URL = 'https://umdasqunvezrdcutgoad.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVtZGFzcXVudmV6cmRjdXRnb2FkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4ODM3OTYsImV4cCI6MjA5NjQ1OTc5Nn0.s-8uznAywIMjep-BZG59TLRZmugYt2W9nhvXZ5Cs4Ek'; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const safeGetItem = (key, fallback) => {
            try {
                const val = localStorage.getItem(key);
                return val !== null ? val : fallback;
            } catch (e) {
                return fallback;
            }
        };

        const safeSetItem = (key, value) => {
            try {
                localStorage.setItem(key, value);
            } catch (e) {
                console.warn("Armazenamento local indisponível:", e);
            }
        };

        const safeRemoveItem = (key) => {
            try {
                localStorage.removeItem(key);
            } catch (e) {}
        };

        const obterBadgeAcao = (acao) => {
            const acaoLimpa = (acao || '').toUpperCase();
            if (acaoLimpa.includes('EXCLUSÃO') || acaoLimpa.includes('REMOVE') || acaoLimpa.includes('DELET')) {
                return 'bg-red-500/20 text-red-400 border border-red-500/30';
            }
            if (acaoLimpa.includes('EDIÇÃO') || acaoLimpa.includes('EDIT')) {
                return 'bg-blue-500/20 text-blue-400 border border-blue-500/30';
            }
            if (acaoLimpa.includes('FIADO')) {
                return 'bg-yellow-500/20 text-yellow-500 border border-yellow-500/30';
            }
            if (acaoLimpa.includes('PAGO') || acaoLimpa.includes('VENDA') || acaoLimpa.includes('RECEB')) {
                return 'bg-green-500/20 text-green-400 border border-green-500/30';
            }
            return 'bg-slate-700/50 text-slate-300 border border-slate-600/30';
        };

        const obterCorCategoria = (cat) => {
            const c = (cat || '').toUpperCase();
            switch (c) {
                case 'CERVEJA': return 'bg-amber-500/20 text-amber-400 border border-amber-500/30';
                case 'BAR': return 'bg-blue-500/20 text-blue-400 border border-blue-500/30';
                case 'DOSE': case 'DOSES': return 'bg-purple-500/20 text-purple-400 border border-purple-500/30';
                case 'ESPETO': return 'bg-rose-500/20 text-rose-400 border border-rose-500/30';
                case 'COZINHA': return 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30';
                default: return 'bg-slate-700/50 text-slate-400 border border-slate-600/30';
            }
        };

        const App = () => {
            const [userLogado, setUserLogado] = useState(null);
            const [pagina, setPagina] = useState('home');
            
            const [qtdMesas, setQtdMesas] = useState(() => {
                const num = Number(safeGetItem('jb_qtd_mesas', '12'));
                return (num && num > 0) ? num : 12;
            });
            const [mesas, setMesas] = useState(() => {
                const num = Number(safeGetItem('jb_qtd_mesas', '12'));
                const length = (num && num > 0) ? num : 12;
                return Array.from({ length }, (_, i) => ({ id: i + 1, itens: [], total: 0, apelido: '' }));
            });

            const [produtos, setProdutos] = useState([]);
            const [categoriasDb, setCategoriasDb] = useState(null);
            const [notas, setNotas] = useState([]);
            const [logs, setLogs] = useState([]);
            const [equipe, setEquipe] = useState([]);
            const [idMesaAberta, setIdMesaAberta] = useState(null);
            const [buscaProduto, setBuscaProduto] = useState('');
            const [categoriaSelecionada, setCategoriaSelecionada] = useState('Todos');
            const [produtoEditando, setProdutoEditando] = useState(null);
            const [filtroUsuarioLog, setFiltroUsuarioLog] = useState('');
            const [paginaLog, setPaginaLog] = useState(1);
            const logsPorPagina = 30;

            const [listaGastos, setListaGastos] = useState([]);

            const categoriasAtendimento = useMemo(() => {
                const listaUnificada = [{ id: 'Todos', label: 'Todos', emoji: '🍽️', nome: 'Todos' }];
                if (categoriasDb === null) {
                    return [
                        { id: 'Todos', label: 'Todos', emoji: '🍽️', nome: 'Todos' },
                        { id: 'Cerveja', label: 'Cerveja', emoji: '🍺', nome: 'Cerveja' },
                        { id: 'Bar', label: 'Bar', emoji: '🍹', nome: 'Bar' },
                        { id: 'Espeto', label: 'Espeto', emoji: '🍢', nome: 'Espeto' },
                        { id: 'Doses', label: 'Doses', emoji: '🥃', nome: 'Doses' },
                        { id: 'Cozinha', label: 'Cozinha', emoji: '🍳', nome: 'Cozinha' },
                        { id: 'Outros', label: 'Outros', emoji: '📦', nome: 'Outros' }
                    ];
                }
                categoriasDb.forEach(c => {
                    listaUnificada.push({ id: c.nome, label: c.nome, nome: c.nome, emoji: c.emoji || '📦' });
                });
                return listaUnificada;
            }, [categoriasDb]);

            const buscarDados = useCallback(async () => {
                try {
                    const { data: prods } = await supabaseClient.from('produtos').select('*').order('nome');
                    if (prods) setProdutos(prods);

                    const { data: cats, error: catsError } = await supabaseClient.from('categorias').select('*').order('nome');
                    if (cats) {
                        if (cats.length === 0) {
                            const padroes = [
                                { nome: 'Cerveja', emoji: '🍺' }, { nome: 'Bar', emoji: '🍹' }, { nome: 'Espeto', emoji: '🍢' },
                                { nome: 'Doses', emoji: '🥃' }, { nome: 'Cozinha', emoji: '🍳' }, { nome: 'Outros', emoji: '📦' }
                            ];
                            await supabaseClient.from('categorias').insert(padroes);
                            const { data: recats } = await supabaseClient.from('categorias').select('*').order('nome');
                            if (recats) setCategoriasDb(recats);
                        } else {
                            setCategoriasDb(cats);
                        }
                    } else if (catsError) {
                        setCategoriasDb(null);
                    }

                    const { data: config } = await supabaseClient.from('configuracoes_sistema').select('*').eq('chave', 'qtd_mesas').single();
                    let mesasCount = qtdMesas;
                    if (config) {
                        const num = Number(config.valor);
                        if (num && num > 0) {
                            mesasCount = num;
                            if (num !== qtdMesas) {
                                setQtdMesas(num);
                                safeSetItem('jb_qtd_mesas', num);
                            }
                        }
                    }

                    const { data: pedidos } = await supabaseClient.from('pedidos').select('*');
                    const novasMesas = Array.from({ length: mesasCount }, (_, i) => ({ id: i + 1, itens: [], total: 0, apelido: '' }));
                    if (pedidos) {
                        pedidos.forEach(p => {
                            const idx = p.mesa - 1;
                            if (novasMesas[idx]) {
                                novasMesas[idx].itens.push(p);
                                novasMesas[idx].total += Number(p.preco_unidade);
                                if (p.apelido_mesa) novasMesas[idx].apelido = p.apelido_mesa;
                            }
                        });
                    }
                    setMesas(novasMesas);

                    const { data: nts } = await supabaseClient.from('notas_pendentes').select('*').eq('pago', false).order('data', { ascending: false });
                    if (nts) setNotas(nts);

                    const { data: lg } = await supabaseClient.from('logs_sistema').select('*').order('data', { ascending: false }).limit(1000);
                    if (lg) setLogs(lg);

                    const { data: eq = [] } = await supabaseClient.from('usuarios_gestao').select('id, usuario, nivel').order('usuario');
                    if (eq) setEquipe(eq);

                    const { data: gst } = await supabaseClient.from('gastos').select('*').order('data', { ascending: false });
                    if (gst) setListaGastos(gst);

                } catch (e) { console.error(e); }
            }, [qtdMesas]);

            useEffect(() => {
                const sessao = safeGetItem('jb_user_data', null);
                if (sessao) {
                    try {
                        setUserLogado(JSON.parse(sessao));
                    } catch (err) {
                        safeRemoveItem('jb_user_data');
                    }
                }
                buscarDados();
                const t = setInterval(buscarDados, 5000);
                return () => clearInterval(t);
            }, [buscarDados]);

            useEffect(() => {
                if (userLogado && userLogado.nivel !== 'admin' && pagina !== 'home') {
                    setPagina('home');
                }
            }, [userLogado, pagina]);

            const registrarLog = async (acao, detalhes) => {
                if(!userLogado) return;
                await supabaseClient.from('logs_sistema').insert([{ usuario: userLogado.usuario, acao, detalhes }]);
                buscarDados();
            };

            const salvarNovaQtdMesas = async (novaQtd) => {
                setQtdMesas(novaQtd);
                safeSetItem('jb_qtd_mesas', novaQtd);
                try {
                    await supabaseClient.from('configuracoes_sistema').update({ valor: String(novaQtd) }).eq('chave', 'qtd_mesas');
                    registrarLog("MESAS", `Alterou a quantidade total de mesas para ${novaQtd}`);
                    buscarDados();
                } catch (err) { console.error(err); }
            };

            const abasDisponiveis = useMemo(() => {
                if (userLogado && userLogado.nivel === 'admin') {
                    return ['home', 'notas', 'estoque', 'equipe', 'logs', 'financeiro', 'gastos'];
                }
                return ['home'];
            }, [userLogado]);

            const totalParaReceber = useMemo(() => notas.reduce((acc, n) => acc + Number(n.valor || 0), 0), [notas]);
            const totalNotasAbertas = notas.length;

            const notasAgrupadas = useMemo(() => {
                const grupos = {};
                notas.forEach(n => {
                    const cliente = (n.cliente || "DESCONHECIDO").toUpperCase().trim();
                    if (!grupos[cliente]) { grupos[cliente] = { cliente, total: 0, notasOriginais: [] }; }
                    grupos[cliente].total += Number(n.valor || 0);
                    grupos[cliente].notasOriginais.push(n);
                });
                return Object.values(grupos).sort((a, b) => b.total - a.total);
            }, [notas]);

            const totalClientesPendentes = notasAgrupadas.length;

            const receberPagamentoCliente = async (grupo) => {
                const { cliente, total, notasOriginais } = grupo;
                const inputVal = prompt(`Cliente: ${cliente}\nTotal Devido: R$ ${total.toFixed(2)}\n\nDigite o valor:`, total.toFixed(2));
                if (inputVal === null) return;
                const valorPago = parseFloat(inputVal);
                if (isNaN(valorPago) || valorPago <= 0) return alert("Valor inválido.");
                if (valorPago > total) return alert("Valor maior que o total!");
                try {
                    let restanteParaAbater = valorPago;
                    const notasOrdenadas = [...notasOriginais].sort((a, b) => a.id - b.id);
                    for (let n of notasOrdenadas) {
                        if (restanteParaAbater <= 0) break;
                        const valorNota = Number(n.valor || 0);
                        if (restanteParaAbater >= valorNota) {
                            await supabaseClient.from('notas_pendentes').update({ pago: true }).eq('id', n.id);
                            restanteParaAbater -= valorNota;
                        } else {
                            await supabaseClient.from('notas_pendentes').update({ valor: valorNota - restanteParaAbater }).eq('id', n.id);
                            restanteParaAbater = 0;
                        }
                    }
                    await registrarLog("PAGO", `${cliente}: Recebido R$ ${valorPago.toFixed(2)}`);
                    buscarDados();
                } catch (err) { alert("Erro ao processar pagamento."); }
            };

            const logsFiltrados = useMemo(() => {
                if (!filtroUsuarioLog.trim()) return logs;
                return logs.filter(l => (l.usuario || '').toLowerCase().includes(filtroUsuarioLog.toLowerCase().trim()));
            }, [logs, filtroUsuarioLog]);

            const totalPaginasLog = useMemo(() => Math.ceil(logsFiltrados.length / logsPorPagina) || 1, [logsFiltrados]);
            const paginaLogValida = useMemo(() => Math.min(paginaLog, totalPaginasLog), [paginaLog, totalPaginasLog]);
            const logsPaginados = useMemo(() => {
                const inicio = (paginaLogValida - 1) * logsPorPagina;
                return logsFiltrados.slice(inicio, inicio + logsPorPagina);
            }, [logsFiltrados, paginaLogValida]);

            const resumoFinanceiroTotal = useMemo(() => {
                const dias = {};
                
                logs.forEach(l => {
                    if (!l.data) return;
                    const dataF = new Date(l.data).toLocaleDateString('pt-BR');
                    if (!dias[dataF]) {
                        dias[dataF] = { data: dataF, dataObj: new Date(l.data), vendas: 0, recebidoFiado: 0, saidas: 0, fiadoGerado: 0 };
                    }
                    
                    const acao = (l.acao || '').toUpperCase();
                    const match = (l.detalhes || '').match(/R\$\s*([0-9.,]+)/i);
                    const valor = match ? parseFloat(match[1].replace(',', '.')) : 0;
                    
                    if (acao === 'VENDA') dias[dataF].vendas += valor;
                    else if (acao.includes('PAGO') || acao.includes('RECEB')) dias[dataF].recebidoFiado += valor;
                    else if (acao === 'FIADO') dias[dataF].fiadoGerado += valor;
                });

                listaGastos.forEach(g => {
                    if (!g.data) return;
                    const dataF = new Date(g.data).toLocaleDateString('pt-BR');
                    if (!dias[dataF]) {
                        dias[dataF] = { data: dataF, dataObj: new Date(g.data), vendas: 0, recebidoFiado: 0, saidas: 0, fiadoGerado: 0 };
                    }
                    dias[dataF].saidas += Number(g.valor || 0);
                });
                
                return Object.values(dias)
                    .map(d => ({
                        ...d,
                        totalEntradas: d.vendas + d.recebidoFiado,
                        saldoFinal: (d.vendas + d.recebidoFiado) - d.saidas
                    }))
                    .sort((a, b) => b.dataObj - a.dataObj);
            }, [logs, listaGastos]);

            const finHoje = useMemo(() => {
                const hoje = new Date().toLocaleDateString('pt-BR');
                return resumoFinanceiroTotal.find(d => d.data === hoje) || { data: hoje, vendas: 0, recebidoFiado: 0, saidas: 0, totalEntradas: 0, saldoFinal: 0, fiadoGerado: 0 };
            }, [resumoFinanceiroTotal]);

            const adicionarNovoGasto = async (e) => {
                e.preventDefault();
                const descricao = e.target.descricao.value.trim();
                const valor = parseFloat(e.target.valor.value);
                if (!descricao || isNaN(valor) || valor <= 0) return alert("Insira valores válidos.");
                try {
                    const { error } = await supabaseClient.from('gastos').insert([{ descricao: descricao.toUpperCase(), valor, data: new Date().toISOString() }]);
                    if (error) throw error;
                    registrarLog("GASTO", `Adicionou: ${descricao.toUpperCase()} - R$ ${valor.toFixed(2)}`);
                    e.target.reset();
                    buscarDados();
                } catch (err) { alert("Erro ao salvar gasto."); }
            };

            const removerGastoItem = async (id, desc) => {
                if (confirm(`Remover gasto: ${desc}?`)) {
                    try {
                        await supabaseClient.from('gastos').delete().eq('id', id);
                        registrarLog("EXCLUSÃO GASTO", `Removeu: ${desc}`);
                        buscarDados();
                    } catch (err) { alert("Erro ao excluir."); }
                }
            };

            const resumoGastosMesAtual = useMemo(() => {
                const hoje = new Date();
                return listaGastos.reduce((total, item) => {
                    const d = new Date(item.data);
                    if (d.getMonth() === hoje.getMonth() && d.getFullYear() === hoje.getFullYear()) return total + Number(item.valor || 0);
                    return total;
                }, 0);
            }, [listaGastos]);

            const adicionarProdutoMesa = async (p) => {
                if (p.estoque <= 0) return alert("Sem estoque!");
                try {
                    const mesaAtual = mesas[idMesaAberta - 1];
                    await supabaseClient.from('pedidos').insert([{ mesa: idMesaAberta, produto_nome: p.nome, preco_unidade: p.preco, apelido_mesa: mesaAtual?.apelido || '' }]);
                    await supabaseClient.from('produtos').update({ estoque: p.estoque - 1 }).eq('id', p.id);
                    buscarDados();
                } catch (err) { console.error(err); }
            };

            const alterarApelido = async () => {
                const ap = prompt("Nome/Apelido:", mesas[idMesaAberta - 1]?.apelido || '');
                if (ap !== null) { await supabaseClient.from('pedidos').update({ apelido_mesa: ap }).eq('mesa', idMesaAberta); buscarDados(); }
            };

            const registrarFiado = async () => {
                const clie = prompt("Cliente Fiado:", mesas[idMesaAberta - 1]?.apelido || '');
                if (clie) {
                    const totalMesa = mesas[idMesaAberta - 1]?.total || 0;
                    await supabaseClient.from('notas_pendentes').insert([{ cliente: clie.toUpperCase(), valor: totalMesa }]);
                    await registrarLog("FIADO", `${clie}: R$ ${totalMesa.toFixed(2)}`);
                    await supabaseClient.from('pedidos').delete().eq('mesa', idMesaAberta);
                    setIdMesaAberta(null);
                }
            };

            const registrarPagamento = async () => {
                if (confirm("Confirmar pagamento?")) {
                    await registrarLog("VENDA", `Mesa ${idMesaAberta}: R$ ${mesas[idMesaAberta - 1]?.total.toFixed(2)}`);
                    await supabaseClient.from('pedidos').delete().eq('mesa', idMesaAberta);
                    setIdMesaAberta(null);
                }
            };

            const removerProduto = async (id, nome) => {
                if(confirm(`Excluir ${nome}?`)) { await supabaseClient.from('produtos').delete().eq('id', id); registrarLog("EXCLUSÃO", `Produto removido: ${nome}`); }
            };

            const removerUsuario = async (id, nome) => {
                if(userLogado.usuario === nome) return alert("Não pode excluir a si mesmo!");
                if(confirm(`Remover acesso de ${nome}?`)) { await supabaseClient.from('usuarios_gestao').delete().eq('id', id); registrarLog("EQUIPE", `Removeu usuário: ${nome}`); }
            };

            if (!userLogado) return (
                <div className="h-screen flex items-center justify-center p-6 bg-slate-950">
                    <form onSubmit={async (e) => {
                        e.preventDefault();

                                <input name="n" defaultValue={produtoEditando.nome} className="w-full bg-slate-800 p-3 rounded-xl outline-none font-bold text-white uppercase" />
                                <div className="grid grid-cols-2 gap-2"><input name="p" step="0.01" type="number" defaultValue={produtoEditando.preco} className="bg-slate-800 p-3 rounded-xl text-white font-bold" /><input name="e" type="number" defaultValue={produtoEditando.estoque} className="bg-slate-800 p-3 rounded-xl text-white font-bold" /></div>
                                <select name="c" defaultValue={produtoEditando.categoria} className="w-full bg-slate-800 p-3 rounded-xl text-white font-bold uppercase">{categoriasAtendimento.filter(c=>c.id!=='Todos').map(c=>(<option key={c.id} value={c.nome}>{c.nome}</option>))}</select>
                                <button className="w-full bg-orange-600 p-3.5 rounded-xl font-black uppercase">Salvar</button>
                                <button type="button" onClick={() => setProdutoEditando(null)} className="w-full text-slate-500 font-bold uppercase text-xs">Cancelar</button>
                            </form>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render((<App />));
    </script>
